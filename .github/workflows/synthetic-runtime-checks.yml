name: Synthetic Runtime Checks

run-name: synthetic-runtime-checks:${{ github.event_name }}

on:
  workflow_dispatch:
    inputs:
      run_production_readonly_verify:
        description: "Run production readonly verify in addition to health probes"
        required: true
        default: true
        type: boolean
      run_sse_probes:
        description: "Run optional SSE probes (A2A stream + MCP ready) when synthetic identity variables are configured"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: synthetic-runtime-checks
  cancel-in-progress: false

jobs:
  health-probes:
    name: health-probes
    runs-on: ubuntu-latest
    env:
      STAGING_BASE_URL: ${{ vars.ACP_STAGING_BASE_URL }}
      STAGING_TENANT_ID: ${{ vars.ACP_STAGING_TENANT_ID }}
      PRODUCTION_BASE_URL: ${{ vars.ACP_PRODUCTION_BASE_URL }}
      PRODUCTION_TENANT_ID: ${{ vars.ACP_PRODUCTION_TENANT_ID }}
      SYNTH_SUBJECT_ID: ${{ vars.ACP_SYNTH_SUBJECT_ID }}
      SYNTH_SUBJECT_ROLES: ${{ vars.ACP_SYNTH_SUBJECT_ROLES }}
      RUN_SSE_PROBES: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.run_sse_probes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run synthetic probes
        id: run_synthetic_probes
        run: |
          set -euo pipefail
          mkdir -p synthetic-runtime-checks
          node <<'EOF'
          const fs = require("node:fs");
          const { setTimeout: delay } = require("node:timers/promises");

          const service = "agent-control-plane";
          const runSseProbes = (process.env.RUN_SSE_PROBES || "false") === "true";
          const synthSubjectId = (process.env.SYNTH_SUBJECT_ID || "").trim();
          const synthSubjectRoles = (process.env.SYNTH_SUBJECT_ROLES || "").trim();

          const targets = [
            {
              environment: "staging",
              baseUrl: (process.env.STAGING_BASE_URL || "").trim(),
              tenantId: (process.env.STAGING_TENANT_ID || "").trim(),
            },
            {
              environment: "production",
              baseUrl: (process.env.PRODUCTION_BASE_URL || "").trim(),
              tenantId: (process.env.PRODUCTION_TENANT_ID || "").trim(),
            },
          ].filter((target) => target.baseUrl);

          if (targets.length === 0) {
            throw new Error("No runtime check targets configured. Set ACP_STAGING_BASE_URL and/or ACP_PRODUCTION_BASE_URL repository variables.");
          }

          for (const target of targets) {
            if (!target.baseUrl.startsWith("https://")) {
              throw new Error(`base_url must start with https:// for ${target.environment} (received: ${target.baseUrl})`);
            }
          }

          function nowIso() {
            return new Date().toISOString();
          }

          function buildHeaders({ includeIdentity, tenantId } = {}) {
            const headers = new Headers({
              "user-agent": "agent-control-plane-synthetic-runtime-checks",
            });
            if (tenantId) {
              headers.set("X-Tenant-Id", tenantId);
            }
            if (includeIdentity) {
              headers.set("X-Authenticated-Subject", synthSubjectId);
              headers.set("X-Authenticated-Roles", synthSubjectRoles);
            }
            return headers;
          }

          async function fetchJson(url, options) {
            const startedAt = nowIso();
            const start = Date.now();
            const response = await fetch(url, options);
            const statusCode = response.status;
            let json = null;
            try {
              json = await response.json();
            } catch {
              json = null;
            }
            return {
              ok: response.ok,
              status_code: statusCode,
              duration_ms: Date.now() - start,
              started_at: startedAt,
              completed_at: nowIso(),
              json,
              headers: Object.fromEntries(response.headers.entries()),
            };
          }

          async function readEventStreamPrefix(url, options) {
            const startedAt = nowIso();
            const start = Date.now();
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 8000);
            const response = await fetch(url, { ...options, signal: controller.signal });

            const contentType = response.headers.get("content-type") || "";
            const cacheControl = response.headers.get("cache-control") || "";

            let text = "";
            let firstByteAt = null;
            try {
              const reader = response.body?.getReader ? response.body.getReader() : null;
              if (!reader) {
                return {
                  ok: false,
                  started_at: startedAt,
                  completed_at: nowIso(),
                  duration_ms: Date.now() - start,
                  latency_ms: null,
                  status_code: response.status,
                  content_type: contentType,
                  cache_control: cacheControl,
                  text: null,
                  error: "missing_readable_stream",
                };
              }

              const decoder = new TextDecoder();
              const deadline = Date.now() + 5000;
              while (Date.now() < deadline && text.length < 32768) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value && value.length) {
                  if (firstByteAt === null) firstByteAt = Date.now();
                  text += decoder.decode(value, { stream: true });
                  // Most endpoints send ready/snapshot early; bail once we have a couple events.
                  if (text.includes("\nevent: ready\n") && (text.includes("\nevent: snapshot\n") || text.includes("\n\ndata:"))) {
                    break;
                  }
                } else {
                  await delay(25);
                }
              }
            } catch (error) {
              // Ignore; we'll return whatever we collected.
            } finally {
              clearTimeout(timeout);
              controller.abort();
            }

            return {
              ok: response.ok,
              started_at: startedAt,
              completed_at: nowIso(),
              duration_ms: Date.now() - start,
              latency_ms: firstByteAt === null ? null : firstByteAt - start,
              status_code: response.status,
              content_type: contentType,
              cache_control: cacheControl,
              text,
              error: null,
            };
          }

          function parseTraceIdFromJson(json) {
            const trace = json?.meta?.trace_id;
            return typeof trace === "string" && trace ? trace : null;
          }

          function assert(condition, message) {
            if (!condition) {
              throw new Error(message);
            }
          }

          function validateCheckShape(check, index) {
            assert(check && typeof check === "object", `checks[${index}] must be an object`);
            assert(typeof check.service === "string" && check.service !== "", `checks[${index}].service must be a non-empty string`);
            assert(typeof check.environment === "string" && check.environment !== "", `checks[${index}].environment must be a non-empty string`);
            assert(typeof check.check_id === "string" && check.check_id !== "", `checks[${index}].check_id must be a non-empty string`);
            if (check.skipped === true) {
              assert(typeof check.reason === "string" && check.reason !== "", `checks[${index}].reason must be set when skipped=true`);
              return;
            }
            assert(typeof check.base_url === "string" && check.base_url.startsWith("https://"), `checks[${index}].base_url must start with https://`);
            assert(typeof check.timestamp === "string" && check.timestamp !== "", `checks[${index}].timestamp must be set`);
            assert(typeof check.status_code === "number", `checks[${index}].status_code must be a number`);
            assert(typeof check.ok === "boolean", `checks[${index}].ok must be a boolean`);
          }

          function validateSummaryShape(summary) {
            assert(summary && typeof summary === "object", "synthetic summary must be an object");
            assert(typeof summary.ok === "boolean", "summary.ok must be a boolean");
            assert(summary.service === service, `summary.service must be ${service}`);
            assert(typeof summary.generated_at === "string" && summary.generated_at !== "", "summary.generated_at must be set");
            assert(typeof summary.run_sse_probes === "boolean", "summary.run_sse_probes must be a boolean");
            assert(Array.isArray(summary.configured_targets) && summary.configured_targets.length > 0, "summary.configured_targets must be a non-empty array");
            assert(summary.configured_identity && typeof summary.configured_identity === "object", "summary.configured_identity must be an object");
            assert(Array.isArray(summary.checks) && summary.checks.length > 0, "summary.checks must be a non-empty array");
            summary.checks.forEach(validateCheckShape);
          }

          async function probeHealth(target) {
            const url = `${target.baseUrl}/api/v1/health`;
            const result = await fetchJson(url, { method: "GET", headers: buildHeaders() });
            const traceId = parseTraceIdFromJson(result.json);
            return {
              service,
              environment: target.environment,
              check_id: "health_global",
              base_url: target.baseUrl,
              tenant_id: target.tenantId || null,
              timestamp: result.completed_at,
              started_at: result.started_at,
              completed_at: result.completed_at,
              duration_ms: result.duration_ms,
              status_code: result.status_code,
              ok: result.ok && result.json?.data?.ok === true,
              trace_id: traceId,
              response_json: result.json,
            };
          }

          async function probeA2aStream(target) {
            if (!runSseProbes) {
              return { skipped: true, reason: "disabled", service, environment: target.environment, check_id: "a2a_stream_auth" };
            }
            if (!target.tenantId || !synthSubjectId || !synthSubjectRoles) {
              return {
                skipped: true,
                reason: "missing_config",
                missing: {
                  tenant_id: !target.tenantId,
                  synth_subject_id: !synthSubjectId,
                  synth_subject_roles: !synthSubjectRoles,
                },
                service,
                environment: target.environment,
                check_id: "a2a_stream_auth",
              };
            }
            const url = `${target.baseUrl}/api/v1/a2a/message:stream`;
            const headers = buildHeaders({ includeIdentity: true, tenantId: target.tenantId });
            const result = await readEventStreamPrefix(url, { method: "GET", headers });
            const hasReady = typeof result.text === "string" && result.text.includes("\nevent: ready\n");
            const hasSnapshot = typeof result.text === "string" && result.text.includes("\nevent: snapshot\n");
            const ok =
              result.ok &&
              (result.content_type || "").startsWith("text/event-stream") &&
              (result.cache_control || "").includes("no-cache") &&
              hasReady &&
              hasSnapshot;
            return {
              service,
              environment: target.environment,
              check_id: "a2a_stream_auth",
              base_url: target.baseUrl,
              tenant_id: target.tenantId,
              timestamp: result.completed_at,
              started_at: result.started_at,
              completed_at: result.completed_at,
              duration_ms: result.duration_ms,
              latency_ms: result.latency_ms,
              status_code: result.status_code,
              ok,
              first_event_received: hasReady,
              trace_id: null,
            };
          }

          async function probeMcpReady(target) {
            if (!runSseProbes) {
              return { skipped: true, reason: "disabled", service, environment: target.environment, check_id: "mcp_provider_ready" };
            }
            if (!target.tenantId || !synthSubjectId || !synthSubjectRoles) {
              return {
                skipped: true,
                reason: "missing_config",
                missing: {
                  tenant_id: !target.tenantId,
                  synth_subject_id: !synthSubjectId,
                  synth_subject_roles: !synthSubjectRoles,
                },
                service,
                environment: target.environment,
                check_id: "mcp_provider_ready",
              };
            }
            const listUrl = `${target.baseUrl}/api/v1/tool-providers`;
            const listResult = await fetchJson(listUrl, {
              method: "GET",
              headers: buildHeaders({ includeIdentity: true, tenantId: target.tenantId }),
            });
            const items = Array.isArray(listResult.json?.data?.items) ? listResult.json.data.items : [];
            const active = items.find((item) => item && item.status === "active" && typeof item.tool_provider_id === "string");
            const providerId = active?.tool_provider_id || null;
            if (!providerId) {
              return {
                skipped: true,
                reason: "no_active_tool_provider",
                service,
                environment: target.environment,
                check_id: "mcp_provider_ready",
                base_url: target.baseUrl,
                tenant_id: target.tenantId,
                timestamp: listResult.completed_at,
                status_code: listResult.status_code,
                ok: listResult.ok,
                trace_id: parseTraceIdFromJson(listResult.json),
              };
            }
            const url = `${target.baseUrl}/api/v1/mcp/${providerId}`;
            const result = await readEventStreamPrefix(url, {
              method: "GET",
              headers: buildHeaders({ includeIdentity: true, tenantId: target.tenantId }),
            });
            const hasReady = typeof result.text === "string" && result.text.includes("\nevent: ready\n");
            const ok =
              result.ok &&
              (result.content_type || "").startsWith("text/event-stream") &&
              (result.cache_control || "").includes("no-cache") &&
              hasReady;
            return {
              service,
              environment: target.environment,
              check_id: "mcp_provider_ready",
              provider: providerId,
              base_url: target.baseUrl,
              tenant_id: target.tenantId,
              timestamp: result.completed_at,
              started_at: result.started_at,
              completed_at: result.completed_at,
              duration_ms: result.duration_ms,
              latency_ms: result.latency_ms,
              status_code: result.status_code,
              ok,
              first_event_received: hasReady,
              trace_id: null,
            };
          }

          (async () => {
            const checks = [];
            for (const target of targets) {
              checks.push(await probeHealth(target));
              checks.push(await probeA2aStream(target));
              checks.push(await probeMcpReady(target));
            }

            const ok = checks.every((check) => check && (check.skipped === true || check.ok === true));
            const summary = {
              ok,
              service,
              generated_at: nowIso(),
              run_sse_probes: runSseProbes,
              configured_targets: targets.map((target) => ({
                environment: target.environment,
                base_url: target.baseUrl,
                has_tenant_id: !!target.tenantId,
              })),
              configured_identity: {
                has_subject_id: !!synthSubjectId,
                has_subject_roles: !!synthSubjectRoles,
              },
              checks,
            };

            validateSummaryShape(summary);

            fs.writeFileSync("synthetic-runtime-checks/synthetic-summary.json", `${JSON.stringify(summary, null, 2)}\n`);

            if (!ok) {
              process.exitCode = 1;
            }
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          EOF

      - name: Build synthetic health summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROBE_RUNTIME_OUTCOME: ${{ steps.run_synthetic_probes.outcome }}
          RUN_SSE_PROBES: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.run_sse_probes }}
        run: |
          set -euo pipefail
          mkdir -p synthetic-runtime-checks
          node <<'EOF'
          const fs = require("node:fs");

          const summaryPath = "synthetic-runtime-checks/synthetic-summary.json";
          const hasSummary = fs.existsSync(summaryPath);
          const summary = hasSummary ? JSON.parse(fs.readFileSync(summaryPath, "utf8")) : null;
          const checks = Array.isArray(summary?.checks) ? summary.checks : [];
          const okCount = checks.filter((check) => check && check.ok === true).length;
          const skippedCount = checks.filter((check) => check && check.skipped === true).length;
          const failedCount = checks.filter((check) => check && check.skipped !== true && check.ok !== true).length;

          const lines = [
            "# Synthetic runtime health",
            "",
            `- Event name: ${process.env.EVENT_NAME || "<unknown>"}`,
            `- Run SSE probes: ${process.env.RUN_SSE_PROBES || "false"}`,
            `- Probe runtime: ${process.env.PROBE_RUNTIME_OUTCOME || "skipped"}`,
            `- Summary present: ${hasSummary}`,
            `- Target count: ${Array.isArray(summary?.configured_targets) ? summary.configured_targets.length : 0}`,
            `- Check count: ${checks.length}`,
            `- Successful checks: ${okCount}`,
            `- Skipped checks: ${skippedCount}`,
            `- Failed checks: ${failedCount}`,
          ];
          fs.writeFileSync("synthetic-runtime-checks/synthetic-health-summary.md", `${lines.join("\n")}\n`);

          const manifest = {
            type: "synthetic_runtime_health",
            inputs: {
              event_name: process.env.EVENT_NAME || "",
              run_sse_probes: (process.env.RUN_SSE_PROBES || "false") === "true",
            },
            outcomes: {
              probe_runtime: process.env.PROBE_RUNTIME_OUTCOME || "skipped",
            },
            target_count: Array.isArray(summary?.configured_targets) ? summary.configured_targets.length : 0,
            check_count: checks.length,
            configured_identity: summary?.configured_identity ?? {
              has_subject_id: false,
              has_subject_roles: false,
            },
            artifacts: {
              synthetic_summary_json: "synthetic-runtime-checks/synthetic-summary.json",
              summary_md: "synthetic-runtime-checks/synthetic-health-summary.md",
            },
            generated_at: new Date().toISOString(),
          };
          fs.writeFileSync(
            "synthetic-runtime-checks/synthetic-runtime-health-manifest.json",
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          EOF

      - name: Validate synthetic health artifact contract
        if: always()
        run: |
          set -euo pipefail
          node scripts/validate_synthetic_runtime_artifact.mjs \
            --manifest synthetic-runtime-checks/synthetic-runtime-health-manifest.json \
            --artifact-dir synthetic-runtime-checks

      - name: Upload synthetic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-runtime-health-${{ github.run_id }}
          path: synthetic-runtime-checks/
          if-no-files-found: error

  production-readonly-verify:
    name: production-readonly-verify
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_production_readonly_verify == 'true' }}
    environment: production
    env:
      BASE_URL: ${{ vars.ACP_PRODUCTION_BASE_URL }}
      TENANT_ID: ${{ vars.ACP_PRODUCTION_TENANT_ID }}
      RUN_ID: ${{ vars.ACP_PRODUCTION_RUN_ID }}
    steps:
      - name: Validate readonly inputs
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL}" ] || [ -z "${TENANT_ID}" ] || [ -z "${RUN_ID}" ]; then
            echo "ACP_PRODUCTION_BASE_URL, ACP_PRODUCTION_TENANT_ID, and ACP_PRODUCTION_RUN_ID must be set as repository variables." >&2
            exit 1
          fi
          case "${BASE_URL}" in
            https://*) ;;
            *) echo "ACP_PRODUCTION_BASE_URL must start with https:// (received: ${BASE_URL})" >&2; exit 1 ;;
          esac
          if ! [[ "${RUN_ID}" =~ ^run_ ]]; then
            echo "ACP_PRODUCTION_RUN_ID must start with run_ (received: ${RUN_ID})" >&2
            exit 1
          fi
          mkdir -p synthetic-runtime-checks

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare synthetic runtime output directory
        run: mkdir -p synthetic-runtime-checks

      - name: Run production readonly verify
        id: verify_readonly
        env:
          VERIFY_OUTPUT_PATH: synthetic-runtime-checks/production-readonly-summary.json
        run: |
          set -euo pipefail
          npm run post-deploy:verify:readonly 2>&1 | tee synthetic-runtime-checks/production-readonly.log

      - name: Build synthetic readonly summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERIFY_READONLY_OUTCOME: ${{ steps.verify_readonly.outcome }}
        run: |
          set -euo pipefail
          mkdir -p synthetic-runtime-checks
          cat > synthetic-runtime-checks/production-readonly-summary.md <<EOF
          # Synthetic runtime production readonly verify

          - Event name: ${EVENT_NAME}
          - Base URL: ${BASE_URL}
          - Tenant ID: ${TENANT_ID}
          - Run ID: ${RUN_ID}
          - Readonly verification: ${VERIFY_READONLY_OUTCOME}
          EOF

          if [ -f synthetic-runtime-checks/production-readonly-summary.json ]; then
            node -e '
              const fs = require("node:fs");
              const summary = JSON.parse(fs.readFileSync("synthetic-runtime-checks/production-readonly-summary.json", "utf8"));
              const lines = [
                `- Summary path: ${summary.verification_output_path ?? "synthetic-runtime-checks/production-readonly-summary.json"}`,
                `- Started at: ${summary.started_at ?? "<none>"}`,
                `- Completed at: ${summary.completed_at ?? "<none>"}`,
                `- Duration ms: ${summary.duration_ms ?? "<none>"}`,
                `- Check count: ${summary.check_count ?? "<none>"}`,
                `- Trace ID: ${summary.trace_id ?? "<none>"}`,
                `- Run status: ${summary.run_status ?? "<none>"}`,
                `- Artifact count: ${summary.artifact_count ?? "<none>"}`,
                `- Artifact body checked: ${summary.artifact_body_checked ?? "<none>"}`
              ];
              fs.appendFileSync("synthetic-runtime-checks/production-readonly-summary.md", `${lines.join("\n")}\n`);
            '
          fi

          node -e '
            const fs = require("node:fs");
            const manifest = {
              type: "synthetic_runtime_production_readonly",
              inputs: {
                event_name: process.env.EVENT_NAME || "",
                base_url: process.env.BASE_URL || "",
                tenant_id: process.env.TENANT_ID || "",
                run_id: process.env.RUN_ID || "",
              },
              outcomes: {
                verify_readonly: process.env.VERIFY_READONLY_OUTCOME || "skipped",
              },
              artifacts: {
                verify_readonly_log: "synthetic-runtime-checks/production-readonly.log",
                verify_readonly_summary: "synthetic-runtime-checks/production-readonly-summary.json",
                summary_md: "synthetic-runtime-checks/production-readonly-summary.md",
              },
              generated_at: new Date().toISOString(),
            };
            fs.writeFileSync(
              "synthetic-runtime-checks/synthetic-runtime-production-manifest.json",
              `${JSON.stringify(manifest, null, 2)}\n`,
            );
          '

      - name: Validate synthetic readonly artifact contract
        if: always()
        run: |
          set -euo pipefail
          node scripts/validate_synthetic_runtime_artifact.mjs \
            --manifest synthetic-runtime-checks/synthetic-runtime-production-manifest.json \
            --artifact-dir synthetic-runtime-checks

      - name: Upload production readonly artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-runtime-production-${{ github.run_id }}
          path: synthetic-runtime-checks/
          if-no-files-found: error
