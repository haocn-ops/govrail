name: Production Readonly Verify

run-name: production-readonly-verify:${{ github.event.inputs.run_id }}

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production worker base URL"
        required: true
        default: ""
        type: string
      tenant_id:
        description: "Production or verify tenant ID"
        required: true
        default: tenant_prod
        type: string
      run_id:
        description: "Existing run ID used for readonly verification"
        required: true
        default: ""
        type: string

concurrency:
  group: production-readonly-verify
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  production-readonly-verify:
    name: production-readonly-verify
    runs-on: ubuntu-latest
    steps:
      - name: Validate workflow inputs
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL}" ] || [ -z "${TENANT_ID}" ] || [ -z "${RUN_ID}" ]; then
            echo "base_url, tenant_id, and run_id are required" >&2
            exit 1
          fi
          case "${BASE_URL}" in
            https://*) ;;
            *) echo "base_url must start with https:// (received: ${BASE_URL})" >&2; exit 1 ;;
          esac
          if ! [[ "${RUN_ID}" =~ ^run_ ]]; then
            echo "run_id must start with run_ (received: ${RUN_ID})" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate observability examples
        id: validate_observability
        run: |
          set -euo pipefail
          npm run validate:observability 2>&1 | tee production-readonly-verify/validate-observability.log

      - name: Run production readonly verification
        id: verify_readonly
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          VERIFY_OUTPUT_PATH: production-readonly-verify/verify-readonly-summary.json
        run: |
          mkdir -p production-readonly-verify
          set -euo pipefail
          npm run post-deploy:verify:readonly 2>&1 | tee production-readonly-verify/verify-readonly.log

      - name: Build production readonly summary
        if: always()
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          VALIDATE_OBSERVABILITY_OUTCOME: ${{ steps.validate_observability.outcome }}
          VERIFY_READONLY_OUTCOME: ${{ steps.verify_readonly.outcome }}
        run: |
          mkdir -p production-readonly-verify
          cat > production-readonly-verify/production-readonly-summary.md <<EOF
          # Production readonly verify

          - Base URL: ${BASE_URL}
          - Tenant ID: ${TENANT_ID}
          - Run ID: ${RUN_ID}
          - Observability validation: ${VALIDATE_OBSERVABILITY_OUTCOME}
          - Readonly verification: ${VERIFY_READONLY_OUTCOME}
          EOF

          if [ -f production-readonly-verify/verify-readonly-summary.json ]; then
            node -e '
              const fs = require("node:fs");
              const summary = JSON.parse(fs.readFileSync("production-readonly-verify/verify-readonly-summary.json", "utf8"));
              const lines = [
                `- Summary path: ${summary.verification_output_path ?? "production-readonly-verify/verify-readonly-summary.json"}`,
                `- Started at: ${summary.started_at ?? "<none>"}`,
                `- Completed at: ${summary.completed_at ?? "<none>"}`,
                `- Duration ms: ${summary.duration_ms ?? "<none>"}`,
                `- Check count: ${summary.check_count ?? "<none>"}`,
                `- Trace ID: ${summary.trace_id ?? "<none>"}`,
                `- Run status: ${summary.run_status ?? "<none>"}`,
                `- Artifact count: ${summary.artifact_count ?? "<none>"}`,
                `- Artifact body checked: ${summary.artifact_body_checked ?? "<none>"}`
              ];
              fs.appendFileSync("production-readonly-verify/production-readonly-summary.md", `${lines.join("\n")}\n`);
            '
          fi

          node -e '
            const fs = require("node:fs");
            const manifest = {
              type: "production_readonly_verify",
              inputs: {
                base_url: process.env.BASE_URL || "",
                tenant_id: process.env.TENANT_ID || "",
                run_id: process.env.RUN_ID || ""
              },
              outcomes: {
                validate_observability: process.env.VALIDATE_OBSERVABILITY_OUTCOME || "skipped",
                verify_readonly: process.env.VERIFY_READONLY_OUTCOME || "skipped"
              },
              artifacts: {
                validate_observability_log: "production-readonly-verify/validate-observability.log",
                verify_readonly_log: "production-readonly-verify/verify-readonly.log",
                verify_readonly_summary: "production-readonly-verify/verify-readonly-summary.json",
                summary_md: "production-readonly-verify/production-readonly-summary.md"
              },
              generated_at: new Date().toISOString()
            };
            fs.writeFileSync("production-readonly-verify/production-readonly-manifest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          '

          cat >> production-readonly-verify/production-readonly-summary.md <<'EOF'

          Manifest:
          - production-readonly-verify/production-readonly-manifest.json
          EOF

          cat production-readonly-verify/production-readonly-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate production readonly artifact contract
        if: always()
        run: |
          set -euo pipefail
          node scripts/validate_release_artifact_manifest.mjs \
            --manifest production-readonly-verify/production-readonly-manifest.json \
            --artifact-dir production-readonly-verify

      - name: Upload production readonly artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readonly-verify-${{ github.run_id }}
          path: production-readonly-verify/
          if-no-files-found: error
