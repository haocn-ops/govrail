name: Manual Release Gate

run-name: release-gate:${{ github.event.inputs.verification_mode }}

on:
  workflow_dispatch:
    inputs:
      verification_mode:
        description: "local = verify:local + verify:build; write = additionally run write-mode remote verification; readonly = additionally run readonly remote verification"
        required: true
        default: local
        type: choice
        options:
          - local
          - write
          - readonly
      base_url:
        description: "Deployed worker base URL for remote verification"
        required: false
        default: ""
        type: string
      tenant_id:
        description: "Tenant ID for remote verification"
        required: false
        default: tenant_prod
        type: string
      run_id:
        description: "Existing run ID for readonly verification"
        required: false
        default: ""
        type: string
      expected_run_rate_limit:
        description: "Optional expected RATE_LIMIT_RUNS_PER_MINUTE for write-mode remote verification"
        required: false
        default: ""
        type: string
      expected_replay_rate_limit:
        description: "Optional expected RATE_LIMIT_REPLAYS_PER_MINUTE for write-mode remote verification"
        required: false
        default: ""
        type: string

concurrency:
  group: manual-release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Validate workflow inputs
        env:
          MODE: ${{ github.event.inputs.verification_mode }}
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          EXPECTED_RUN_RATE_LIMIT: ${{ github.event.inputs.expected_run_rate_limit }}
          EXPECTED_REPLAY_RATE_LIMIT: ${{ github.event.inputs.expected_replay_rate_limit }}
        run: |
          set -euo pipefail
          if [ -z "${MODE}" ]; then
            echo "verification_mode is required" >&2
            exit 1
          fi
          if [ "${MODE}" = "write" ] || [ "${MODE}" = "readonly" ]; then
            if [ -z "${BASE_URL}" ] || [ -z "${TENANT_ID}" ]; then
              echo "base_url and tenant_id are required when verification_mode=${MODE}" >&2
              exit 1
            fi
            case "${BASE_URL}" in
              https://*) ;;
              *) echo "base_url must start with https:// (received: ${BASE_URL})" >&2; exit 1 ;;
            esac
          fi
          if [ "${MODE}" = "readonly" ]; then
            if [ -z "${RUN_ID}" ]; then
              echo "run_id is required when verification_mode=readonly" >&2
              exit 1
            fi
            if ! [[ "${RUN_ID}" =~ ^run_ ]]; then
              echo "run_id must start with run_ (received: ${RUN_ID})" >&2
              exit 1
            fi
          fi
          if [ -n "${EXPECTED_RUN_RATE_LIMIT}" ] && ! [[ "${EXPECTED_RUN_RATE_LIMIT}" =~ ^[1-9][0-9]*$ ]]; then
            echo "expected_run_rate_limit must be a positive integer or empty (received: ${EXPECTED_RUN_RATE_LIMIT})" >&2
            exit 1
          fi
          if [ -n "${EXPECTED_REPLAY_RATE_LIMIT}" ] && ! [[ "${EXPECTED_REPLAY_RATE_LIMIT}" =~ ^[1-9][0-9]*$ ]]; then
            echo "expected_replay_rate_limit must be a positive integer or empty (received: ${EXPECTED_REPLAY_RATE_LIMIT})" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run local verification
        id: verify_local
        run: |
          mkdir -p release-gate
          set -euo pipefail
          npm run verify:local 2>&1 | tee release-gate/verify-local.log

      - name: Run build verification
        id: verify_build
        run: |
          set -euo pipefail
          npm run verify:build 2>&1 | tee release-gate/verify-build.log

      - name: Validate observability examples
        id: validate_observability
        run: |
          set -euo pipefail
          npm run validate:observability 2>&1 | tee release-gate/validate-observability.log

      - name: Run write-mode remote verification
        id: verify_write
        if: ${{ github.event.inputs.verification_mode == 'write' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          EXPECT_RATE_LIMIT_RUNS_PER_MINUTE: ${{ github.event.inputs.expected_run_rate_limit }}
          EXPECT_RATE_LIMIT_REPLAYS_PER_MINUTE: ${{ github.event.inputs.expected_replay_rate_limit }}
          VERIFY_OUTPUT_PATH: release-gate/verify-write-summary.json
        run: |
          set -euo pipefail
          mkdir -p release-gate
          npm run post-deploy:verify 2>&1 | tee release-gate/verify-write.log

      - name: Run readonly remote verification
        id: verify_readonly
        if: ${{ github.event.inputs.verification_mode == 'readonly' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          VERIFY_OUTPUT_PATH: release-gate/verify-readonly-summary.json
        run: |
          set -euo pipefail
          mkdir -p release-gate
          set -euo pipefail
          npm run post-deploy:verify:readonly 2>&1 | tee release-gate/verify-readonly.log

      - name: Build gate summary
        if: always()
        env:
          MODE: ${{ github.event.inputs.verification_mode }}
          BASE_URL: ${{ github.event.inputs.base_url }}
          TENANT_ID: ${{ github.event.inputs.tenant_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          EXPECTED_RUN_RATE_LIMIT: ${{ github.event.inputs.expected_run_rate_limit }}
          EXPECTED_REPLAY_RATE_LIMIT: ${{ github.event.inputs.expected_replay_rate_limit }}
          LOCAL_OUTCOME: ${{ steps.verify_local.outcome }}
          BUILD_OUTCOME: ${{ steps.verify_build.outcome }}
          VALIDATE_OBSERVABILITY_OUTCOME: ${{ steps.validate_observability.outcome }}
          WRITE_OUTCOME: ${{ steps.verify_write.outcome }}
          READONLY_OUTCOME: ${{ steps.verify_readonly.outcome }}
        run: |
          mkdir -p release-gate
          cat > release-gate/release-gate-summary.md <<EOF
          # Manual release gate

          - Mode: ${MODE}
          - Local verification: ${LOCAL_OUTCOME}
          - Build verification: ${BUILD_OUTCOME}
          - Observability validation: ${VALIDATE_OBSERVABILITY_OUTCOME}
          EOF

          if [ "${MODE}" = "write" ]; then
            cat >> release-gate/release-gate-summary.md <<EOF
          - Base URL: ${BASE_URL}
          - Tenant ID: ${TENANT_ID}
          - Write-mode remote verification: ${WRITE_OUTCOME:-skipped}
          - Expected run rate limit: ${EXPECTED_RUN_RATE_LIMIT:-<none>}
          - Expected replay rate limit: ${EXPECTED_REPLAY_RATE_LIMIT:-<none>}
          EOF
            if [ -f release-gate/verify-write-summary.json ]; then
              node -e '
                const fs = require("node:fs");
                const summary = JSON.parse(fs.readFileSync("release-gate/verify-write-summary.json", "utf8"));
                const lines = [
                  `- Write summary path: ${summary.verification_output_path ?? "release-gate/verify-write-summary.json"}`,
                  `- Write started at: ${summary.started_at ?? "<none>"}`,
                  `- Write completed at: ${summary.completed_at ?? "<none>"}`,
                  `- Write duration ms: ${summary.duration_ms ?? "<none>"}`,
                  `- Write check count: ${summary.check_count ?? "<none>"}`,
                  `- Write trace ID: ${summary.trace_id ?? "<none>"}`,
                  `- Write run ID: ${summary.run_id ?? "<none>"}`,
                  `- Write policy ID: ${summary.policy_id ?? "<none>"}`,
                  `- Write tool provider ID: ${summary.tool_provider_id ?? "<none>"}`,
                  `- Create rate-limit verification: ${summary.runs_create_rate_limit ?? "<none>"}`,
                  `- Replay rate-limit verification: ${summary.runs_replay_rate_limit ?? "<none>"}`
                ];
                fs.appendFileSync("release-gate/release-gate-summary.md", `${lines.join("\n")}\n`);
              '
            fi
          fi

          if [ "${MODE}" = "readonly" ]; then
            cat >> release-gate/release-gate-summary.md <<EOF
          - Base URL: ${BASE_URL}
          - Tenant ID: ${TENANT_ID}
          - Run ID: ${RUN_ID:-<none>}
          - Readonly verification: ${READONLY_OUTCOME:-skipped}
          EOF
            if [ -f release-gate/verify-readonly-summary.json ]; then
              node -e '
                const fs = require("node:fs");
                const summary = JSON.parse(fs.readFileSync("release-gate/verify-readonly-summary.json", "utf8"));
                const lines = [
                  `- Readonly summary path: ${summary.verification_output_path ?? "release-gate/verify-readonly-summary.json"}`,
                  `- Readonly started at: ${summary.started_at ?? "<none>"}`,
                  `- Readonly completed at: ${summary.completed_at ?? "<none>"}`,
                  `- Readonly duration ms: ${summary.duration_ms ?? "<none>"}`,
                  `- Readonly check count: ${summary.check_count ?? "<none>"}`,
                  `- Readonly trace ID: ${summary.trace_id ?? "<none>"}`,
                  `- Readonly run status: ${summary.run_status ?? "<none>"}`,
                  `- Readonly artifact count: ${summary.artifact_count ?? "<none>"}`,
                  `- Readonly artifact body checked: ${summary.artifact_body_checked ?? "<none>"}`
                ];
                fs.appendFileSync("release-gate/release-gate-summary.md", `${lines.join("\n")}\n`);
              '
            fi
          fi

          cat >> release-gate/release-gate-summary.md <<'EOF'

          This workflow does not deploy. It only wraps verification and uploads logs as an artifact.
          EOF

          node -e '
            const fs = require("node:fs");
            const manifest = {
              type: "manual_release_gate",
              mode: process.env.MODE,
              inputs: {
                base_url: process.env.BASE_URL || "",
                tenant_id: process.env.TENANT_ID || "",
                run_id: process.env.RUN_ID || "",
                expected_run_rate_limit: process.env.EXPECTED_RUN_RATE_LIMIT || "",
                expected_replay_rate_limit: process.env.EXPECTED_REPLAY_RATE_LIMIT || "",
              },
              outcomes: {
                local: process.env.LOCAL_OUTCOME || "skipped",
                build: process.env.BUILD_OUTCOME || "skipped",
                validate_observability: process.env.VALIDATE_OBSERVABILITY_OUTCOME || "skipped",
                write: process.env.WRITE_OUTCOME || "skipped",
                readonly: process.env.READONLY_OUTCOME || "skipped",
              },
              artifacts: {
                local_log: "release-gate/verify-local.log",
                build_log: "release-gate/verify-build.log",
                validate_observability_log: "release-gate/validate-observability.log",
                write_log: "release-gate/verify-write.log",
                write_summary: "release-gate/verify-write-summary.json",
                readonly_log: "release-gate/verify-readonly.log",
                readonly_summary: "release-gate/verify-readonly-summary.json",
                summary_md: "release-gate/release-gate-summary.md",
              },
              generated_at: new Date().toISOString(),
            };
            fs.writeFileSync("release-gate/release-gate-manifest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          '

          cat >> release-gate/release-gate-summary.md <<'EOF'

          Manifest:
          - release-gate/release-gate-manifest.json
          EOF

          cat release-gate/release-gate-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate gate artifact contract
        if: always()
        run: |
          set -euo pipefail
          node scripts/validate_release_artifact_manifest.mjs \
            --manifest release-gate/release-gate-manifest.json \
            --artifact-dir release-gate

      - name: Upload gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-release-gate-${{ github.run_id }}
          path: release-gate/
          if-no-files-found: error
